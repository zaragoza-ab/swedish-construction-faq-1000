name: Build derived formats

on:
  push:
    branches: [main]
    paths: ['data/faq.json', 'scripts/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build derived formats
        run: node scripts/build-formats.mjs

      - name: Commit regenerated formats
        run: |
          git config user.name "zaragoza-ab-bot"
          git config user.email "bot@zaragoza.se"
          git add data/faq.jsonl data/faq-alpaca.jsonl data/faq-sharegpt.jsonl data/faq.csv docs/ web/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate derived formats from faq.json"
            git push
          else
            echo "No changes to commit."
          fi
